<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phronesis | Análise de Fundos CVM</title>
    <!-- Fontes Modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        background: '#080808',
                        surface: 'rgba(255, 255, 255, 0.03)',
                        surfaceHover: 'rgba(255, 255, 255, 0.08)',
                        neon: '#00e5ff',
                        neonDim: 'rgba(0, 229, 255, 0.15)'
                    }
                }
            }
        }
    </script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-background text-white font-sans antialiased overflow-x-hidden relative min-h-screen">
    
    <!-- Efeitos de iluminação de fundo (GlowBackground) -->
    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-neonDim blur-[120px] opacity-30 pointer-events-none pulse-slow"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-neonDim blur-[120px] opacity-20 pointer-events-none pulse-slower"></div>

    <div class="max-w-6xl mx-auto px-6 py-12 relative z-10">
        
        <header class="mb-16 text-center animate-fade-in-up">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-neon">
                Análise de Fundos <span class="text-neon">CVM</span>
            </h1>
            <p class="text-gray-400 text-lg font-light max-w-2xl mx-auto">
                Explore rentabilidades históricas e compare fundos de investimento com dados oficiais da CVM.
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <!-- SEÇÃO: ANÁLISE INDIVIDUAL -->
            <section class="glass-panel p-8 rounded-3xl relative group tilt-card animate-fade-in-up" style="animation-delay: 0.1s;">
                <div class="absolute inset-0 rounded-3xl border border-white/5 group-hover:border-neon/30 transition-colors duration-500 pointer-events-none"></div>
                
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 rounded-full bg-neon/10 flex items-center justify-center text-neon icon-scale-hover">
                        <i class="ph ph-chart-line-up text-xl"></i>
                    </div>
                    <h2 class="text-2xl font-semibold">Análise Individual</h2>
                </div>

                <div class="space-y-6 relative">
                    <!-- Busca -->
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-400 mb-2">Buscar Fundo</label>
                        <div class="relative">
                            <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="busca_fundo_individual" class="w-full bg-black/50 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-neon focus:ring-1 focus:ring-neon transition-all" placeholder="Nome do fundo...">
                        </div>
                        <!-- Lista Suspensa Autocomplete -->
                        <ul id="lista_fundos_individual" class="absolute z-50 w-full mt-2 bg-[#121212] border border-white/10 rounded-xl shadow-2xl max-h-60 overflow-y-auto hidden glass-panel"></ul>
                    </div>
                    <input type="hidden" id="cnpj_individual">

                    <!-- Datas -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Mês Inicial</label>
                            <input type="month" id="data_ini_individual" class="w-full bg-black/50 border border-white/10 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-neon transition-all custom-calendar-icon">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Mês Final</label>
                            <input type="month" id="data_fim_individual" class="w-full bg-black/50 border border-white/10 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-neon transition-all custom-calendar-icon">
                        </div>
                    </div>

                    <!-- Botão -->
                    <button id="btn_analisar" class="w-full py-4 mt-4 bg-neon/10 text-neon font-semibold rounded-xl border border-neon/20 hover:bg-neon hover:text-black transition-all duration-300 magnetic-btn flex justify-center items-center gap-2">
                        <span>Analisar Rentabilidade</span>
                        <i class="ph ph-arrow-right"></i>
                    </button>
                </div>

                <!-- Resultado -->
                <div id="resultado_individual" class="mt-8 hidden">
                    <div class="p-6 rounded-2xl bg-black/40 border border-white/5 result-fade-in flex flex-col items-center justify-center">
                        <span class="text-sm text-gray-400 mb-1">Variação do Período</span>
                        <div class="text-4xl font-bold flex items-center gap-2" id="valor_variacao">
                            <!-- Injetado via JS -->
                        </div>
                    </div>
                </div>
            </section>


            <!-- SEÇÃO: COMPARAÇÃO -->
            <section class="glass-panel p-8 rounded-3xl relative group tilt-card animate-fade-in-up" style="animation-delay: 0.2s;">
                <div class="absolute inset-0 rounded-3xl border border-white/5 group-hover:border-neon/30 transition-colors duration-500 pointer-events-none"></div>

                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 rounded-full bg-neon/10 flex items-center justify-center text-neon icon-scale-hover">
                        <i class="ph ph-scales text-xl"></i>
                    </div>
                    <h2 class="text-2xl font-semibold">Comparar Fundos</h2>
                </div>

                <div class="space-y-6">
                    <!-- Adicionar Fundo -->
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-400 mb-2">Adicionar Fundos</label>
                        <div class="relative">
                            <i class="ph ph-plus absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="busca_fundo_comparacao" class="w-full bg-black/50 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-neon focus:ring-1 focus:ring-neon transition-all" placeholder="Buscar para comparar...">
                        </div>
                        <ul id="lista_fundos_comparacao" class="absolute z-50 w-full mt-2 bg-[#121212] border border-white/10 rounded-xl shadow-2xl max-h-60 overflow-y-auto hidden glass-panel"></ul>
                    </div>

                    <!-- Chips de Fundos Adicionados -->
                    <div id="fundos_adicionados" class="flex flex-wrap gap-2 empty:hidden min-h-[40px]">
                        <!-- Injetado via JS -->
                    </div>

                    <hr class="border-white/5 my-4">

                    <!-- Adicionar Períodos -->
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Adicionar Períodos Customizados</label>
                        <div class="flex flex-col sm:flex-row gap-3">
                            <input type="month" id="comp_data_ini" class="flex-1 bg-black/50 border border-white/10 rounded-xl py-2 px-3 text-white text-sm focus:outline-none focus:border-neon transition-all custom-calendar-icon">
                            <input type="month" id="comp_data_fim" class="flex-1 bg-black/50 border border-white/10 rounded-xl py-2 px-3 text-white text-sm focus:outline-none focus:border-neon transition-all custom-calendar-icon">
                            <button id="btn_add_periodo" class="bg-surface hover:bg-surfaceHover text-white px-4 py-2 rounded-xl transition-all border border-white/10 text-sm flex items-center justify-center magnetic-btn">
                                <i class="ph ph-plus"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Chips de Períodos Adicionados -->
                    <div id="periodos_adicionados" class="flex flex-wrap gap-2 empty:hidden min-h-[40px]">
                        <!-- Injetado via JS -->
                    </div>

                    <!-- Botão -->
                    <button id="btn_comparar" class="w-full py-4 mt-6 bg-white text-black font-semibold rounded-xl hover:bg-neon transition-all duration-300 magnetic-btn flex justify-center items-center gap-2">
                        <i class="ph ph-magic-wand"></i>
                        <span>Gerar Comparativo</span>
                    </button>
                </div>

                <!-- Resultado Comparação -->
                <div id="resultado_comparacao" class="mt-8 hidden">
                    <div class="overflow-x-auto rounded-xl border border-white/5 bg-black/40 p-1">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="bg-white/5 border-b border-white/10">
                                <tr id="tabela_comparacao_head">
                                    <!-- JS -->
                                </tr>
                            </thead>
                            <tbody id="tabela_comparacao_body" class="divide-y divide-white/5">
                                <!-- JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </section>
        </div>
    </div>

    <!-- Loader Global Overlay -->
    <div id="global_loader" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="relative w-16 h-16">
            <div class="absolute inset-0 border-4 border-neon/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-neon border-t-transparent rounded-full animate-spin"></div>
        </div>
        <p class="mt-4 text-neon font-medium tracking-widest animate-pulse">PROCESSANDO...</p>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
